[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "blackdog"
version = "0.1.0"
description = "Repo-scoped backlog CLI for AI-assisted local development"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
blackdog = "blackdog.cli:main"
blackdog-skill = "blackdog.skill_cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.package-data]
blackdog = ["ui.css"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.blackdog.coverage]
artifact_output = "coverage/latest.json"
shipped_surface = ["src/blackdog/cli.py", "src/blackdog/scaffold.py", "src/blackdog/ui.py"]
