[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "blackdog"
version = "0.1.0"
description = "Repo-scoped backlog CLI for AI-assisted local development"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
blackdog = "blackdog.cli:main"
blackdog-skill = "blackdog.skill_cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.package-data]
blackdog = ["ui.css"]

[tool.setuptools.packages.find]
where = ["src"]
# Keep one distribution while extracting internal `blackdog.*`
# subpackages behind the documented core/proper/viewers/adapters split.
include = ["blackdog", "blackdog.*"]

[tool.blackdog.coverage]
artifact_output = "coverage/latest.json"
# Focus the audit surface on core state and backlog semantics; broad CLI,
# supervisor, scaffold, and UI coverage stays in the repo-wide test suite.
shipped_surface = [
  "src/blackdog/backlog.py",
  "src/blackdog/config.py",
  "src/blackdog/store.py",
  "src/blackdog/worktree.py",
]
